config_version = 1

[bar]
order = [ "top" ]

    [bar.top]
    center = [ "workspaces" ]
    concave_edge_corners = false
    end = [ "tray", "notifications", "battery", "network", "control-center", "clock" ]
    margin_ends = 0
    radius_top_left = 0
    radius_top_right = 0
    start = [ "active_window", "media" ]
    widget_spacing = 15

        [bar.top.dead_zone]
        middle_command = "noctalia msg settings-open"

[control_center]
hidden_tabs = [ "screen-time" ]
sidebar_section = "full"

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "notification"

    [[control_center.shortcuts]]
    type = "power_profile"

    [[control_center.shortcuts]]
    type = "wallpaper"

[dock]
auto_hide = true
reserve_space = false

[location]
auto_locate = true

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1", "lockscreen-widget-0000000000000001" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 683.0
    cy = 477.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 96.0
    box_width = 384.0
    cx = 683.0
    cy = 384.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000001.settings]
        background = false
        background_opacity = 1.0
        background_radius = 12
        format = "{:%H:%M}"

[notification]
layer = "overlay"

[osd]
position = "top_right"
position_vertical = "top_right"

[plugins]
enabled = []

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

[shell]
clipboard_enabled = false
font_family = "Adwaita Sans"
launch_apps_custom_command = "vicinae toggle"
time_format = "{:%-I:%M %p}"

    [[shell.session.actions]]
    action = "lock"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    countdown_seconds = 0.0
    enabled = false
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "5"
    variant = "destructive"

[theme]
builtin = "Nord"
community_palette = "Espresso Cream"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "vibrant"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "ghostty", "hyprland", "kcolorscheme", "qt", "starship" ]
    community_ids = [ "spicetify", "vicinae" ]

[wallpaper]
transition = [ "stripes" ]

    [wallpaper.default]
    path = "/home/darwin/Pictures/Wallpapers/wallhaven-8378o2_1920x1080.png"

    [wallpaper.last]
    path = "/home/darwin/Pictures/Wallpapers/wallhaven-8378o2_1920x1080.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/darwin/Pictures/Wallpapers/wallhaven-8378o2_1920x1080.png"

[weather]
unit = "imperial"

[widget.battery]
show_label = false

[widget.clock]
format = "{:%-I:%M %p}"

[widget.launcher]
custom_image_colorize = true
enabled = true

[widget.media]
hide_when_no_media = true
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.tray]
drawer = true

[widget.workspaces]
empty_color = "outline"
occupied_color = "outline"