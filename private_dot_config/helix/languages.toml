# https://docs.helix-editor.com/languages.html#language-configuration
# 
# [[language]]
# name = "mylang"
# scope = "source.mylang"
# injection-regex = "mylang"
# file-types = ["mylang", "myl"]
# comment-tokens = "#"
# indent = { tab-width = 2, unit = "  " }
# formatter = { command = "mylang-formatter" , args = ["--stdin"] }
# language-servers = [ "mylang-lsp" ]
[language-server.hx-lsp]
command = "hx-lsp"

[language-server.hx-lsp.config]
markdown = false
documentColor = true


# Cargo.toml LSP
[language-server.crates-lsp]
command = "crates-lsp"
except-features = ["format"]
config = { inlay_hints = true, needs_update_severity = 1 }

# Steel LSP
[language-server.steel-language-server]
command = "steel-language-server"

# AstroJS LSP
[language-server.astro-language-server]
command = "astro-language-server"
args = ["--stdio"]
config = { "typescript" = { "tsdk" = "/opt/homebrew/lib/node_modules/typescript/lib/"}, "environment" = "node" }


# TOML LSP
[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]

[[language]]
name = "toml"
language-servers = [ "crates-lsp", "taplo", "hx-lsp" ]
formatter = { command = "taplo", args = ["fmt", "-"] }

[[language]]
name = "scheme"
language-servers = [ "steel-language-server" ]

[[language]]
name = "rust"
indent = { tab-width = 4, unit = " " }

[[language]]
name = "astro"
scope = "source.astro"
injection-regex = "astro"
file-types = ["astro"]
roots = ["package.json", "astro.config.mjs"]
language-servers = ["astro-language-server"]
